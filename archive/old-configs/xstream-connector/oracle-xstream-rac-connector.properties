# Oracle XStream CDC Connector - standalone mode
# Set database.password, database.hostname, database.service.name (from gv$SERVICES)
name=oracle-xstream-rac-connector
connector.class=io.confluent.connect.oracle.xstream.cdc.OracleXStreamSourceConnector
tasks.max=1

database.hostname=racdb-scan.your-domain.oraclevcn.com
database.port=1521
database.user=c##cfltuser
database.password=YOUR_PASSWORD
database.dbname=DB0312
database.service.name=SYS\\$SYS.Q\\$_XOUT_XX.DB0312.YOUR_DOMAIN.ORACLEVCN.COM
database.out.server.name=xout
database.pdb.name=XSTRPDB

confluent.topic.replication.factor=1
confluent.topic.bootstrap.servers=localhost:9092
topic.prefix=racdb
# Single-table CDC test: MTX_TRANSACTION_ITEMS only. Full MTX* regex preserved in:
#   oracle-xstream-rac-connector.properties.backup-all-mtx-regex-20260415
table.include.list=ORDERMGMT\.MTX_TRANSACTION_ITEMS

key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=false

schema.history.internal.kafka.topic=__orcl-schema-changes.racdb
schema.history.internal.kafka.bootstrap.servers=localhost:9092
schema.history.internal.kafka.recovery.poll.interval.ms=30000

# First run: initial snapshot of MTX tables. If Grafana stays ~0 for a long time, check Connect logs
# for "snapshot" vs "streaming". After a successful first sync, you may use snapshot.mode=schema_only
# on connector restarts (see Confluent Oracle XStream CDC docs) to shorten startup.
snapshot.mode=initial
snapshot.fetch.size=10000
snapshot.max.threads=4
query.fetch.size=10000
max.queue.size=65536
max.batch.size=16384
producer.override.batch.size=204800
producer.override.linger.ms=50
# Large records / headroom (match broker message.max.bytes).
producer.override.max.request.size=10485760
producer.override.buffer.memory=104857600
# Heartbeat messages to Kafka (~5 min default). Small periodic Grafana spikes on internal topics are often
# this heartbeat, not MTX DML. Lower for testing only, e.g. 60000.
heartbeat.interval.ms=300000
