global:
  resolve_timeout: 5m
  # SMTP configuration for email alerts (optional)
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alerts@yourcompany.com'
  # smtp_auth_username: 'alerts@yourcompany.com'
  # smtp_auth_password: 'your-app-password'

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route configuration
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      repeat_interval: 5m

    # Warning alerts - less frequent
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 1h

# Receivers (notification channels)
receivers:
  - name: 'default-receiver'
    # Slack webhook (example - replace with your webhook URL)
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#kafka-alerts'
    #     title: 'Oracle XStream CDC Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

  - name: 'critical-alerts'
    # Email configuration (example)
    # email_configs:
    #   - to: 'oncall@yourcompany.com'
    #     headers:
    #       Subject: '[CRITICAL] Oracle XStream CDC Alert'
    #     html: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

    # Webhook for PagerDuty/OpsGenie (example)
    # webhook_configs:
    #   - url: 'https://events.pagerduty.com/v2/enqueue'
    #     send_resolved: true

  - name: 'warning-alerts'
    # Slack for warnings
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#kafka-warnings'
    #     title: '[WARNING] Oracle XStream CDC'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

# Inhibition rules - suppress alerts
inhibit_rules:
  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

