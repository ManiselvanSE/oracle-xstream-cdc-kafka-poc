# JMX Exporter config for Kafka brokers
# Exposes Kafka broker metrics for Prometheus scraping
# lowercaseOutputName: true → Prometheus names are lowercased (e.g. jvm_os_processcpuload, not jvm_os_ProcessCpuLoad).
# Ref: https://github.com/prometheus/jmx_exporter
lowercaseOutputName: true
lowercaseOutputLabelNames: true
whitelistObjectNames:
  - "kafka.server:*"
  - "kafka.network:*"
  - "kafka.log:*"
  - "kafka.controller:*"
  - "java.lang:*"
rules:
  - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
    name: kafka_server_$1_$2
    labels:
      clientId: "$3"
      topic: "$4"
      partition: "$5"
    type: GAUGE
  - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Count
    name: kafka_server_$1_$2
    labels:
      clientId: "$3"
      topic: "$4"
      partition: "$5"
    type: COUNTER
  # BrokerTopicMetrics - messages/bytes in per topic (required for throughput panels)
  - pattern: kafka.server<type=BrokerTopicMetrics, name=MessagesInPerSec, topic=(.+)><>Count
    name: kafka_server_brokertopicmetrics_messagesin_total
    labels:
      topic: "$1"
    type: COUNTER
  - pattern: kafka.server<type=BrokerTopicMetrics, name=MessagesInPerSec, topic=(.+)><>OneMinuteRate
    name: kafka_server_brokertopicmetrics_messagesin_oneminuterate
    labels:
      topic: "$1"
    type: GAUGE
  - pattern: kafka.server<type=BrokerTopicMetrics, name=BytesInPerSec, topic=(.+)><>Count
    name: kafka_server_brokertopicmetrics_bytesin_total
    labels:
      topic: "$1"
    type: COUNTER
  - pattern: kafka.server<type=BrokerTopicMetrics, name=BytesInPerSec, topic=(.+)><>OneMinuteRate
    name: kafka_server_brokertopicmetrics_bytesin_oneminuterate
    labels:
      topic: "$1"
    type: GAUGE
  - pattern: kafka.server<type=(.+), name=(.+)><>Value
    name: kafka_server_$1_$2
    type: GAUGE
  - pattern: kafka.server<type=(.+), name=(.+)><>Count
    name: kafka_server_$1_$2
    type: COUNTER
  - pattern: kafka.network<type=(.+), name=(.+)><>Value
    name: kafka_network_$1_$2
    type: GAUGE
  - pattern: kafka.log<type=(.+), name=(.+), topic=(.+), partition=(.*)><>Value
    name: kafka_log_$1_$2
    labels:
      topic: "$3"
      partition: "$4"
    type: GAUGE
  - pattern: kafka.controller<type=(.+), name=(.+)><>Value
    name: kafka_controller_$1_$2
    type: GAUGE
  - pattern: java.lang<type=Memory><>HeapMemoryUsage\.(used|committed|max)
    name: jvm_memory_heap_$1
    type: GAUGE
  - pattern: java.lang<type=OperatingSystem><>((ProcessCpuTime|SystemCpuLoad|ProcessCpuLoad))
    name: jvm_os_$1
    type: GAUGE
  - pattern: java.lang<type=Threading><>ThreadCount
    name: jvm_threads_count
    type: GAUGE
