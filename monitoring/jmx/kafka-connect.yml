  # Kafka producer (Connect internal producers) — https://docs.confluent.io/platform/current/kafka/producer-metrics.html
  - pattern: kafka.producer<type=producer-metrics,client-id=(.+)><>outgoing-byte-rate
    name: kafka_producer_outgoing_byte_rate
    labels:
      client_id: "$1"
    type: GAUGE
  - pattern: kafka.producer<type=producer-metrics, client-id=(.+)><>outgoing-byte-rate
    name: kafka_producer_outgoing_byte_rate
    labels:
      client_id: "$1"
    type: GAUGE
  - pattern: kafka.producer<type=producer-metrics,client-id=(.+)><>incoming-byte-rate
    name: kafka_producer_incoming_byte_rate
    labels:
      client_id: "$1"
    type: GAUGE
  - pattern: kafka.producer<type=producer-metrics, client-id=(.+)><>incoming-byte-rate
    name: kafka_producer_incoming_byte_rate
    labels:
