# Pre-aggregated CDC metrics for Grafana/alerts/Explore (evaluated every 30s).
# Query e.g. cdc:debezium_oracle_events_per_second:sum5m when debugging dashboards.
groups:
  - name: cdc_golden_metrics
    interval: 30s
    rules:
      - record: cdc:debezium_oracle_events_per_second:sum5m
        expr: sum(rate(debezium_oracle_connector_total_number_of_events_seen{context="streaming"}[5m])) by (server, job)
      - record: cdc:kafka_broker_mtx_messagesin_per_second:sum5m
        expr: sum(rate(kafka_server_brokertopicmetrics_messagesin_total{topic=~".*\\.ORDERMGMT\\.MTX.*"}[5m])) by (job)
      - record: cdc:kafka_broker_mtx_transaction_items_messagesin_per_second:sum5m
        expr: sum(rate(kafka_server_brokertopicmetrics_messagesin_total{topic=~".*ORDERMGMT\\.MTX_TRANSACTION_ITEMS"}[5m])) by (job)
