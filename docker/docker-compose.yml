# Oracle XStream CDC POC - 3-Broker Kafka Cluster (KRaft) + Schema Registry + Connect
# JMX Prometheus exporters are enabled on Kafka, Connect, and Schema Registry (Prometheus scrapes :9990–:9992).
# Run: docker compose -f docker/docker-compose.yml up -d
# With monitoring: docker compose -f docker/docker-compose.yml -f docker/docker-compose.monitoring.yml up -d
# Bootstrap (from host): localhost:9092 (or localhost:9092,localhost:9094,localhost:9095)

services:
  kafka1:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    hostname: kafka1
    container_name: kafka1
    ports:
      - "9092:9092"
      - "9990:9990"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: AlJKskIpQOCMAdPQfVpD4g
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka1:29092,CONTROLLER://kafka1:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Large CDC payloads (e.g. CLOB load tests); must be >= producer max.request.size
      KAFKA_MESSAGE_MAX_BYTES: "10485760"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - kafka1-data:/var/lib/kafka/data
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro
    healthcheck:
      # Clear KAFKA_OPTS so the CLI does not start a second JMX exporter on :9990 (would fail with "Address already in use").
      test: ["CMD-SHELL", "KAFKA_OPTS= kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  kafka2:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    hostname: kafka2
    container_name: kafka2
    ports:
      - "9094:9094"
      - "9991:9990"
    environment:
      KAFKA_NODE_ID: 2
      CLUSTER_ID: AlJKskIpQOCMAdPQfVpD4g
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka2:29092,CONTROLLER://kafka2:29093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_MESSAGE_MAX_BYTES: "10485760"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - kafka2-data:/var/lib/kafka/data
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "KAFKA_OPTS= kafka-broker-api-versions --bootstrap-server localhost:9094 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  kafka3:
    build:
      context: .
      dockerfile: Dockerfile.kafka-jmx
    image: kafka-jmx:7.9.0
    hostname: kafka3
    container_name: kafka3
    ports:
      - "9095:9095"
      - "9992:9990"
    environment:
      KAFKA_NODE_ID: 3
      CLUSTER_ID: AlJKskIpQOCMAdPQfVpD4g
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka3:29092,CONTROLLER://kafka3:29093,PLAINTEXT_HOST://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka3:29092,PLAINTEXT_HOST://localhost:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:29093,2@kafka2:29093,3@kafka3:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_MESSAGE_MAX_BYTES: "10485760"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "10485760"
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9990:/opt/jmx-exporter/kafka-broker.yml"
    volumes:
      - kafka3-data:/var/lib/kafka/data
      - ../monitoring/jmx/kafka-broker.yml:/opt/jmx-exporter/kafka-broker.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "KAFKA_OPTS= kafka-broker-api-versions --bootstrap-server localhost:9095 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 45s

  schema-registry:
    build:
      context: .
      dockerfile: Dockerfile.schema-registry-jmx
    image: schema-registry-jmx:7.9.0
    hostname: schema-registry
    container_name: schema-registry
    ports:
      - "8081:8081"
      - "9993:9992"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092,kafka3:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 3
      SCHEMA_REGISTRY_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9992:/opt/jmx-exporter/schema-registry.yml"
    volumes:
      - ../monitoring/jmx/schema-registry.yml:/opt/jmx-exporter/schema-registry.yml:ro
    depends_on:
      - kafka1
      - kafka2
      - kafka3

  connect:
    build:
      context: .
      dockerfile: Dockerfile.connect
    hostname: connect
    container_name: connect
    # JDBC from inside this container must resolve database.hostname (Oracle connector).
    # Without this, valid sqlplus from the VM host can work while Connect gets ORA-12545.
    # Override in .env: ORACLE_CONNECT_EXTRA_HOST=scan.example.com:10.0.0.29
    extra_hosts:
      - "${ORACLE_CONNECT_EXTRA_HOST:-racdb-scan.sub01061249390.xstrmconnectdb2.oraclevcn.com:10.0.0.29}"
    ports:
      - "8083:8083"
      - "9994:9991"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka1:29092,kafka2:29092,kafka3:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: oracle-xstream-connect
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 2
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 2
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 2
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      LD_LIBRARY_PATH: /opt/oracle/instantclient
      KAFKA_OPTS: "-javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=9991:/opt/jmx-exporter/kafka-connect.yml -Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Xms512m -Xmx2g"
    volumes:
      - ../xstream-connector:/opt/connector-config:ro
      - ${ORACLE_INSTANTCLIENT_PATH:-/opt/oracle/instantclient/instantclient_19_30}:/opt/oracle/instantclient:ro
      - ../monitoring/jmx/kafka-connect.yml:/opt/jmx-exporter/kafka-connect.yml:ro
    depends_on:
      schema-registry:
        condition: service_started
    restart: unless-stopped

networks:
  default:
    name: xstream-cdc-net

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
